<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290">
<title>Flag That - Screenshot 2: Gameplay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Barlow:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1290px;
    height: 2796px;
    overflow: hidden;
    background: #1A1820;
    font-family: 'Barlow', sans-serif;
    position: relative;
  }

  /* Headline area */
  .headline {
    text-align: center;
    padding: 160px 80px 60px;
    position: relative;
    z-index: 10;
  }

  .headline h1 {
    font-family: 'Libre Baskerville', serif;
    font-size: 88px;
    color: #EEE9E2;
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 24px;
  }

  .headline h1 .gold { color: #E9BA4C; }

  .headline p {
    font-size: 42px;
    color: #B8B2A8;
    font-weight: 500;
    line-height: 1.4;
  }

  /* Phone mockup - centered */
  .phone-wrap {
    display: flex;
    justify-content: center;
    position: relative;
    z-index: 10;
    margin-top: 40px;
  }

  .phone {
    width: 620px;
    height: 1300px;
    background: #2A2930;
    border-radius: 64px;
    padding: 18px;
    position: relative;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    background: #F5EFE6;
    border-radius: 48px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Game screen mockup */
  .game-header {
    background: #F5EFE6;
    padding: 20px 28px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .game-exit {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    font-weight: 600;
    color: #8A8494;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .game-progress {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .game-score {
    font-family: 'Libre Baskerville', serif;
    font-size: 20px;
    font-weight: 700;
    color: #1A1820;
  }

  .progress-bar-bg {
    width: 120px;
    height: 6px;
    background: #D5CFC6;
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    width: 60%;
    height: 100%;
    background: #E9BA4C;
    border-radius: 3px;
  }

  .game-streak-pill {
    background: #E9BA4C;
    color: #130F00;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Flag display */
  .flag-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 28px;
  }

  .flag-question {
    font-size: 18px;
    font-weight: 600;
    color: #5C5764;
    margin-bottom: 24px;
  }

  .flag-display {
    width: 420px;
    height: 280px;
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 36px;
    background: #EDE7DE;
  }

  .flag-display img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Answer options */
  .answers {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 0 28px 30px;
  }

  .answer-btn {
    padding: 18px 22px;
    border-radius: 14px;
    font-size: 19px;
    font-weight: 600;
    text-align: left;
    border: 2px solid transparent;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .answer-btn.default {
    background: #FFFFFF;
    color: #1A1820;
    border-color: #EDE7DE;
  }

  .answer-btn.correct {
    background: rgba(30, 143, 86, 0.10);
    color: #1E8F56;
    border-color: #1E8F56;
  }

  .answer-btn .check-icon {
    display: flex;
    align-items: center;
  }

  /* Bottom features */
  .features {
    position: absolute;
    bottom: 100px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 60px;
    z-index: 10;
  }

  .feature {
    text-align: center;
  }

  .feature .icon {
    width: 64px;
    height: 64px;
    border-radius: 14px;
    background: rgba(233,186,76,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
  }

  .feature .label {
    font-size: 28px;
    font-weight: 600;
    color: #EEE9E2;
  }

  .feature .sub {
    font-size: 22px;
    color: #6E6878;
    font-weight: 500;
  }

  .diff-easy { color: #3DBF80; }
  .diff-medium { color: #E9BA4C; }
  .diff-hard { color: #EC6666; }
</style>
</head>
<body>

<div class="headline">
  <h1>Guess the Flag.<br/><span class="gold">Beat Your Best.</span></h1>
  <p>Easy, medium, or hard - you choose the challenge</p>
</div>

<div class="phone-wrap">
  <div class="phone">
    <div class="phone-screen">
      <div class="game-header">
        <span class="game-exit">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8A8494" stroke-width="2.5"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
          Exit
        </span>
        <div class="game-progress">
          <span class="game-score">6 / 10</span>
          <div class="progress-bar-bg"><div class="progress-bar-fill"></div></div>
        </div>
        <span class="game-streak-pill">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="#130F00"><path d="M13.5 0.67C13.5 0.67 14.24 3.32 14.24 5.47C14.24 7.53 12.89 9.2 10.83 9.2C8.76 9.2 7.2 7.53 7.2 5.47L7.23 5.11C5.21 7.51 4 10.62 4 14C4 18.42 7.58 22 12 22C16.42 22 20 18.42 20 14C20 8.61 17.41 3.8 13.5 0.67Z"/></svg>
          4
        </span>
      </div>

      <div class="flag-area">
        <div class="flag-question">Which country does this flag belong to?</div>
        <div class="flag-display">
          <img src="https://flagcdn.com/w640/br.png" alt="Brazil flag">
        </div>
      </div>

      <div class="answers">
        <div class="answer-btn correct">
          <span>Brazil</span>
          <span class="check-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1E8F56" stroke-width="2.5"><polyline points="4 12 10 18 20 6"/></svg></span>
        </div>
        <div class="answer-btn default">Bolivia</div>
        <div class="answer-btn default">Colombia</div>
        <div class="answer-btn default">Venezuela</div>
      </div>
    </div>
  </div>
</div>

<div class="features">
  <div class="feature">
    <div class="icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3DBF80" stroke-width="2"><polyline points="4 12 10 18 20 6"/></svg>
    </div>
    <div class="label diff-easy">Easy</div>
    <div class="sub">2 choices</div>
  </div>
  <div class="feature">
    <div class="icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#E9BA4C" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
    </div>
    <div class="label diff-medium">Medium</div>
    <div class="sub">4 choices</div>
  </div>
  <div class="feature">
    <div class="icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#EC6666" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
    </div>
    <div class="label diff-hard">Hard</div>
    <div class="sub">Type it</div>
  </div>
</div>

</body>
</html>
