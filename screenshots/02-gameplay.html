<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290">
<title>Flag That - Screenshot 2: Gameplay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Barlow:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1290px;
    height: 2796px;
    overflow: hidden;
    background: #1A1820;
    font-family: 'Barlow', sans-serif;
    position: relative;
  }

  /* Headline area */
  .headline {
    text-align: center;
    padding: 160px 80px 60px;
    position: relative;
    z-index: 10;
  }

  .headline h1 {
    font-family: 'Libre Baskerville', serif;
    font-size: 88px;
    color: #EEE9E2;
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 24px;
  }

  .headline h1 .gold { color: #E9BA4C; }

  .headline p {
    font-size: 42px;
    color: #B8B2A8;
    font-weight: 500;
    line-height: 1.4;
  }

  /* Phone mockup - centered */
  .phone-wrap {
    display: flex;
    justify-content: center;
    position: relative;
    z-index: 10;
    margin-top: 40px;
  }

  .phone {
    width: 620px;
    height: 1300px;
    background: #2A2930;
    border-radius: 64px;
    padding: 18px;
    box-shadow: 0 40px 120px rgba(0,0,0,0.5);
    position: relative;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    background: #F5EFE6;
    border-radius: 48px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Game screen mockup */
  .game-header {
    background: #F5EFE6;
    padding: 20px 28px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .game-exit {
    font-size: 16px;
    font-weight: 600;
    color: #8A8494;
  }

  .game-progress {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .game-score {
    font-family: 'Libre Baskerville', serif;
    font-size: 20px;
    font-weight: 700;
    color: #1A1820;
  }

  .progress-bar-bg {
    width: 120px;
    height: 6px;
    background: #D5CFC6;
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    width: 60%;
    height: 100%;
    background: #E9BA4C;
    border-radius: 3px;
  }

  .game-streak-pill {
    background: #E9BA4C;
    color: #130F00;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
  }

  /* Flag display */
  .flag-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 28px;
  }

  .flag-question {
    font-size: 18px;
    font-weight: 600;
    color: #5C5764;
    margin-bottom: 20px;
  }

  .flag-display {
    font-size: 160px;
    margin-bottom: 36px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.08));
  }

  /* Answer options */
  .answers {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 0 28px 30px;
  }

  .answer-btn {
    padding: 18px 22px;
    border-radius: 14px;
    font-size: 19px;
    font-weight: 600;
    text-align: left;
    border: 2px solid transparent;
  }

  .answer-btn.default {
    background: #FFFFFF;
    color: #1A1820;
    border-color: #EDE7DE;
  }

  .answer-btn.correct {
    background: #E8F8EF;
    color: #1E8F56;
    border-color: #1E8F56;
    position: relative;
  }

  .answer-btn.correct::after {
    content: '✓';
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 22px;
    font-weight: 800;
  }

  .answer-btn.wrong {
    background: #FDECEC;
    color: #C43030;
    border-color: #C43030;
    position: relative;
  }

  .answer-btn.wrong::after {
    content: '✗';
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 22px;
    font-weight: 800;
  }

  /* Decorative elements */
  .glow-left {
    position: absolute;
    top: 600px;
    left: -200px;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(233,186,76,0.15) 0%, transparent 70%);
  }

  .glow-right {
    position: absolute;
    top: 1200px;
    right: -200px;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(30,143,86,0.12) 0%, transparent 70%);
  }

  /* Bottom features */
  .features {
    position: absolute;
    bottom: 100px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 60px;
    z-index: 10;
  }

  .feature {
    text-align: center;
  }

  .feature .icon {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: rgba(233,186,76,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
    font-size: 28px;
    color: #E9BA4C;
  }

  .feature .label {
    font-size: 28px;
    font-weight: 600;
    color: #EEE9E2;
  }

  .feature .sub {
    font-size: 22px;
    color: #6E6878;
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="glow-left"></div>
<div class="glow-right"></div>

<div class="headline">
  <h1>Guess the Flag.<br/><span class="gold">Beat Your Best.</span></h1>
  <p>Easy, medium, or hard - you choose the challenge</p>
</div>

<div class="phone-wrap">
  <div class="phone">
    <div class="phone-screen">
      <div class="game-header">
        <span class="game-exit">Exit</span>
        <div class="game-progress">
          <span class="game-score">6 / 10</span>
          <div class="progress-bar-bg"><div class="progress-bar-fill"></div></div>
        </div>
        <span class="game-streak-pill">&#9733; 4</span>
      </div>

      <div class="flag-area">
        <div class="flag-question">Which country does this flag belong to?</div>
        <div class="flag-display">🇧🇷</div>
      </div>

      <div class="answers">
        <div class="answer-btn correct">Brazil</div>
        <div class="answer-btn default">Bolivia</div>
        <div class="answer-btn default">Colombia</div>
        <div class="answer-btn default">Venezuela</div>
      </div>
    </div>
  </div>
</div>

<div class="features">
  <div class="feature">
    <div class="icon">&#9650;</div>
    <div class="label">Easy</div>
    <div class="sub">2 choices</div>
  </div>
  <div class="feature">
    <div class="icon">&#9670;</div>
    <div class="label">Medium</div>
    <div class="sub">4 choices</div>
  </div>
  <div class="feature">
    <div class="icon">&#9733;</div>
    <div class="label">Hard</div>
    <div class="sub">Type it</div>
  </div>
</div>

</body>
</html>
