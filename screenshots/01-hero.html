<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290">
<title>Flag That - Screenshot 1: Hero</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Barlow:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1290px;
    height: 2796px;
    overflow: hidden;
    background: #1A1820;
    font-family: 'Barlow', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Headline ── */
  .headline {
    text-align: center;
    padding: 160px 60px 0;
  }
  .wordmark {
    font-family: 'Libre Baskerville', serif;
    font-size: 100px;
    letter-spacing: -2px;
    margin-bottom: 28px;
  }
  .wm-flag { color: #EEE9E2; font-weight: 700; }
  .wm-that { color: #E9BA4C; font-style: italic; font-weight: 400; }

  .hook {
    font-family: 'Barlow', sans-serif;
    font-size: 56px;
    font-weight: 700;
    color: #EEE9E2;
    line-height: 1.2;
    max-width: 1000px;
    margin: 0 auto 16px;
  }
  .hook em {
    font-style: normal;
    color: #E9BA4C;
  }
  .subhook {
    font-size: 38px;
    font-weight: 500;
    color: #B8B2A8;
    margin-bottom: 50px;
  }

  /* ── Phone ── */
  .phone {
    width: 740px;
    flex: 1;
    background: #2A2930;
    border-radius: 72px 72px 0 0;
    padding: 20px 20px 0;
  }
  .screen {
    width: 100%;
    height: 100%;
    background: #F5EFE6;
    border-radius: 54px 54px 0 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .status-bar {
    padding: 18px 36px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 18px;
    font-weight: 600;
    color: #1A1820;
  }

  .app {
    flex: 1;
    padding: 4px 32px 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* App header */
  .app-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0 16px;
  }
  .app-wordmark {
    font-family: 'Libre Baskerville', serif;
    font-size: 36px;
  }
  .app-wm-flag { color: #1A1820; font-weight: 700; }
  .app-wm-that { color: #E9BA4C; font-style: italic; }
  .level-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    border: 1.5px solid #E9BA4C;
    border-radius: 999px;
    padding: 4px 12px;
    background: #FFFFFF;
  }
  .lvl-label { font-size: 11px; font-weight: 600; color: #8A8494; text-transform: uppercase; letter-spacing: 0.5px; }
  .lvl-num { font-family: 'Libre Baskerville', serif; font-size: 20px; font-weight: 700; color: #E9BA4C; }

  /* Teaser */
  .teaser-label {
    font-size: 14px; font-weight: 600; color: #8A8494;
    text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 10px;
  }
  .teaser-flag {
    width: 100%; aspect-ratio: 3/2; border-radius: 14px;
    overflow: hidden; background: #EDE7DE; margin-bottom: 12px;
  }
  .teaser-flag img { width: 100%; height: 100%; object-fit: cover; }

  .opts-grid { display: flex; flex-direction: column; gap: 10px; }
  .opts-row { display: flex; gap: 10px; }
  .opt {
    flex: 1; background: #FFFFFF; border: 1.5px solid rgba(0,0,0,0.08);
    border-radius: 10px; height: 56px; display: flex; align-items: center;
    justify-content: center; font-size: 17px; font-weight: 500; color: #1A1820;
  }
  .opt.correct {
    background: rgba(30,143,86,0.10); border-color: #1E8F56; color: #1E8F56;
  }
  .teaser-result {
    text-align: center; margin-top: 12px;
    font-size: 22px; font-weight: 600; color: #1E8F56;
    text-transform: uppercase; letter-spacing: 1px;
  }

  /* Play Now */
  .play-btn {
    margin-top: 16px;
    background: #E9BA4C; border-radius: 14px; padding: 17px 0;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 4px 0 #5C3506;
  }
  .play-text {
    font-size: 22px; font-weight: 600; color: #130F00;
    text-transform: uppercase; letter-spacing: 0.8px;
  }
</style>
</head>
<body>

<div class="headline">
  <div class="wordmark"><span class="wm-flag">Flag</span><span class="wm-that">That</span></div>
  <div class="hook">How well do you <em>really</em> know the world?</div>
  <div class="subhook">195 flags. 12 game modes. One addictive quiz.</div>
</div>

<div class="phone">
  <div class="screen">
    <div class="status-bar">
      <span>9:41</span>
      <svg width="16" height="12" viewBox="0 0 20 14" fill="#1A1820"><rect x="0" y="8" width="3" height="6" rx="0.5"/><rect x="5" y="5" width="3" height="9" rx="0.5"/><rect x="10" y="2" width="3" height="12" rx="0.5"/><rect x="15" y="0" width="3" height="14" rx="0.5"/></svg>
    </div>
    <div class="app">
      <div class="app-header">
        <div class="app-wordmark"><span class="app-wm-flag">Flag</span><span class="app-wm-that">That</span></div>
        <div class="level-badge"><span class="lvl-label">Lvl</span><span class="lvl-num">14</span></div>
      </div>

      <div class="teaser-label">Name this flag</div>
      <div class="teaser-flag"><img src="https://flagcdn.com/w640/lc.png" alt="Saint Lucia"></div>
      <div class="opts-grid">
        <div class="opts-row">
          <div class="opt correct">Saint Lucia</div>
          <div class="opt">Barbados</div>
        </div>
        <div class="opts-row">
          <div class="opt">Dominica</div>
          <div class="opt">Grenada</div>
        </div>
      </div>
      <div class="teaser-result">Correct!</div>

      <div class="play-btn">
        <span class="play-text">Play Now</span>
        <svg width="14" height="14" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21" fill="#130F00"/></svg>
      </div>
    </div>
  </div>
</div>

</body>
</html>
