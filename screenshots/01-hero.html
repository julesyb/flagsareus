<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290">
<title>Flag That - Screenshot 1: Hero</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Barlow:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1290px;
    height: 2796px;
    overflow: hidden;
    background: #F5EFE6;
    font-family: 'Barlow', sans-serif;
    position: relative;
  }

  /* Decorative flag mosaic background using real flag images */
  .mosaic {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1500px;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 12px;
    padding: 40px 30px;
    opacity: 0.14;
    transform: rotate(-3deg) scale(1.15);
    transform-origin: center top;
  }

  .mosaic .flag {
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(154, 92, 10, 0.06);
  }

  .mosaic .flag img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Content */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 0 80px;
    text-align: center;
  }

  .wordmark {
    font-family: 'Libre Baskerville', serif;
    font-size: 120px;
    letter-spacing: -2px;
    margin-bottom: 30px;
  }
  .wordmark .flag-word { color: #1A1820; font-weight: 700; }
  .wordmark .that-word { color: #9A5C0A; font-style: italic; font-weight: 400; }

  .tagline {
    font-family: 'Barlow', sans-serif;
    font-size: 48px;
    font-weight: 600;
    color: #5C5764;
    line-height: 1.35;
    max-width: 900px;
    margin-bottom: 80px;
  }

  /* Phone mockup */
  .phone {
    width: 580px;
    height: 1180px;
    background: #1A1820;
    border-radius: 60px;
    padding: 18px;
    position: relative;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    background: #F5EFE6;
    border-radius: 44px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Mini home screen inside phone */
  .phone-status {
    padding: 16px 30px 8px;
    display: flex;
    justify-content: space-between;
    font-size: 16px;
    font-weight: 600;
    color: #1A1820;
  }

  .phone-home {
    flex: 1;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
  }

  .phone-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .phone-wordmark {
    font-family: 'Libre Baskerville', serif;
    font-size: 32px;
  }
  .phone-wordmark .flag-word { color: #1A1820; font-weight: 700; }
  .phone-wordmark .that-word { color: #9A5C0A; font-style: italic; }

  .phone-level-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    border: 2px solid #E9BA4C;
    border-radius: 20px;
    padding: 4px 14px;
  }
  .phone-level-badge .lvl-label {
    font-size: 11px;
    font-weight: 600;
    color: #8A8494;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .phone-level-badge .lvl-num {
    font-family: 'Libre Baskerville', serif;
    font-size: 18px;
    font-weight: 700;
    color: #E9BA4C;
  }

  /* Flag teaser card */
  .phone-teaser {
    background: #FFFFFF;
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .teaser-label {
    font-size: 12px;
    font-weight: 600;
    color: #8A8494;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 12px;
  }

  .teaser-flag {
    width: 100%;
    height: 160px;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 14px;
    background: #EDE7DE;
  }

  .teaser-flag img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .teaser-opts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .teaser-opt {
    padding: 12px 10px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    background: #FFFFFF;
    border: 2px solid #EDE7DE;
    color: #1A1820;
  }

  .teaser-opt.correct {
    background: rgba(30, 143, 86, 0.10);
    border-color: #1E8F56;
    color: #1E8F56;
  }

  /* Play button */
  .phone-play-btn {
    background: #E9BA4C;
    color: #130F00;
    border: none;
    border-radius: 14px;
    padding: 16px 0;
    font-family: 'Barlow', sans-serif;
    font-size: 18px;
    font-weight: 700;
    width: 100%;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    box-shadow: 0 4px 0 #5C3506;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .phone-play-btn svg {
    display: inline-block;
    vertical-align: middle;
  }

  /* Config card */
  .phone-config {
    background: #FFFFFF;
    border-radius: 14px;
    padding: 14px 16px;
  }

  .config-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
  }

  .config-row + .config-row {
    border-top: 1px solid rgba(0,0,0,0.06);
    padding-top: 10px;
    margin-top: 4px;
  }

  .config-label {
    font-size: 14px;
    font-weight: 500;
    color: #5C5764;
  }

  .config-btns {
    display: flex;
    gap: 6px;
  }

  .seg-btn {
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    background: #FFFFFF;
    border: 1px solid rgba(0,0,0,0.08);
    color: #5C5764;
  }

  .seg-btn.active {
    background: #E9BA4C;
    border-color: #E9BA4C;
    color: #130F00;
  }

  /* Bottom tagline */
  .bottom-bar {
    position: absolute;
    bottom: 100px;
    left: 0; right: 0;
    text-align: center;
  }
  .bottom-bar p {
    font-size: 36px;
    font-weight: 700;
    color: #9A5C0A;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
</style>
</head>

  <div class="bottom-bar">
